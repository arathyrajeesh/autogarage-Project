{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Krishna Auto Care</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="{% static 'core/css/style.css' %}">
</head>
<body>

<div class="login-gfx">
  <div class="gear gear-1"></div>
  <div class="gear gear-2"></div>
  <div class="gear gear-3"></div>
</div>

<main class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <img src="{% static 'core/images/logo.png' %}" alt="Logo" style="width:80px;height:80px;border-radius:12px;margin-bottom:1rem;box-shadow: 0 10px 20px rgba(0,0,0,0.3);">
      <h1>Krishna Auto Care</h1>
      <p>Precision Management System</p>
    </div>

    {% if form.errors %}
    <div class="alert alert-error" style="margin-bottom:1rem;">
      ❌ Invalid username or password.
    </div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label for="id_role">Role</label>
        <select name="role" id="id_role" class="form-input">
          <option value="owner">Owner</option>
          <option value="advisor">Service Advisor</option>
          <option value="mechanic">Mechanic</option>
          <option value="store_manager">Store Manager</option>
        </select>
      </div>
      <div class="form-group">
        <label for="id_username">Username</label>
        <input type="text" name="username" id="id_username" class="form-input"
              placeholder="Enter your username" autofocus autocomplete="username">
      </div>

      <div class="form-group">
        <label for="id_password">Password</label>
        <input type="password" name="password" id="id_password" class="form-input"
              placeholder="Enter your password" autocomplete="current-password">
      </div>

      <button type="submit" class="btn btn-primary login-submit">
        🔑 Sign In
      </button>

    </form>

    <p class="text-muted text-center mt-2" style="font-size:0.78rem;">
      Contact system owner for access
    </p>
  </div>
</main>
</body>
</html>
